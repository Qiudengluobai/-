  <!DOCTYPE html>
  <html>
  <head><meta charset="utf-8"></head>
  <body>
  <script>
  var params = new URLSearchParams(window.location.search);
  var role = encodeURIComponent(params.get('role') || 'default');
  var sess = encodeURIComponent(params.get('sess') || 'default');
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/gh/Qiudengluobai/-@main/inject.js?roleId=' + role + '&sessionId=' + sess;
  document.head.appendChild(s);
  </script>
  </body>
  </html>
